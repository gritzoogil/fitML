{% extends 'base.html' %}
{% block title %}Register - FitML{% endblock %}
{% block content %}
<div class="auth-container">
    <h1>Join FitML</h1>
    <p>AI-powered fitness tracking and prediction.</p>
    <div class="auth-form">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password (min 6 characters)">
        <input type="password" id="confirm-password" placeholder="Confirm Password">
        <button type="button" onclick="handleRegister()">Create Account</button>
        <p>Already have an account? <a href="/auth/login">Login here</a></p>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script id="firebase-config" type="application/json">
    {
        "apiKey": "{{ firebase_config.apiKey }}",
        "authDomain": "{{ firebase_config.authDomain }}",
        "projectId": "{{ firebase_config.projectId }}",
        "storageBucket": "{{ firebase_config.storageBucket }}",
        "messagingSenderId": "{{ firebase_config.messagingSenderId }}",
        "appId": "{{ firebase_config.appId }}"
    }
</script>
{% endblock %}
